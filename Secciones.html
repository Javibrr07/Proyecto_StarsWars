<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proyecto Star Wars</title>
<link rel="stylesheet" href="estilos.css">
</head>
<body>

<!--HEADER-->
<header>
    <h1 id="Hangar">Hangar de naves</h1>
    <h1 id="Pilotos">Registro de pilotos</h1>
    <h1 id="Misiones">Panel de misiones</h1>
    <h1 id="Alianza">Modo de alianza</h1>
</header>

<main>

<!-- SECCION 1 HANGAR -->
<section id="seccionHangar" class="seccion activa">

    <h1>🚀 Hangar de Naves Rebelde</h1>

    <div class="control">
        <input type="text" id="buscador" placeholder="Buscar nave por nombre...">

        <select id="filtroTipo">
            <option value="todos">Todos los tipos</option>
        </select>

        <button id="ordenarBtn">Ordenar por velocidad ↑</button>
    </div>

    <div id="contador">Mostrando 0 naves</div>

    <div class="hangar" id="hangar"></div>

</section>

<!-- SECCION 2 PILOTOS -->
<section id="seccionPilotos" class="seccion">

    <h1 id="h1cuestionario">Registre su piloto</h1>

    <div class="contenedorPrincipal">

        <div class="divFormulario">
            <img id="soldado" src="soldado.png">

            <form id="formularioPilotos" class="formularioPilotos">

                <input type="text" id="inputNombre" required placeholder="Nombre del piloto:">
                <input type="text" id="inputRango" required placeholder="Rango:">
                <input type="number" id="inputVictorias" required placeholder="Número de victorias:" min="0">

                <select id="selectNave" required>
                    <option value="" disabled selected>Nave asignada:</option>
                </select>

                <select id="selectEstado" required>
                    <option value="" disabled selected>Estado del piloto:</option>
                    <option value="Activo">Activo</option>
                    <option value="Herido">Herido</option>
                    <option value="KIA">KIA</option>
                </select>

                <button id="guardarPiloto">Guardar piloto</button>

            </form>
        </div>

        <div class="divLista">
            <h2>Flota Registrada</h2>

            <table class="tablaPilotos">
                <thead>
                    <tr>
                        <th>Piloto</th>
                        <th>Rango</th>
                        <th>Victorias</th>
                        <th>Nave</th>
                        <th>Estado</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="cuerpoTablaPilotos"></tbody>
            </table>
        </div>

    </div>

</section>

<!-- SECCION 3 -->
<section id="seccionMisiones" class="seccion">
<h1>📋 Panel de Misiones</h1>

<div class="form">
    <input type="text" id="nombre" placeholder="Nombre misión">
    <input type="text" id="descripcion" placeholder="Descripción">

    <select id="piloto">
        <option value="">Selecciona piloto</option>
    </select>

    <select id="dificultad">
        <option value="facil">Fácil</option>
        <option value="media">Media</option>
        <option value="dificil">Difícil</option>
        <option value="suicida">Suicida</option>
    </select>

    <button id="addBtn">Añadir misión</button>
</div>


<div>
    <select id="filtroDificultad">
        <option value="todos">Todas</option>
        <option value="facil">Fácil</option>
        <option value="media">Media</option>
        <option value="dificil">Difícil</option>
        <option value="suicida">Suicida</option>
    </select>
</div>

<div class="kanban">

    <div class="col">
        <h2>Pendiente (<span id="Pendiente">0</span>)</h2>
        <div id="pendiente"></div>
    </div>

    <div class="col">
        <h2>En curso (<span id="Curso">0</span>)</h2>
        <div id="curso"></div>
    </div>

    <div class="col">
        <h2>Completada (<span id="Completada">0</span>)</h2>
        <div id="completada"></div>
    </div>

</div></section>

<!-- SECCION 4 -->
<section id="seccionAlianza" class="seccion">
ç</section>

</main>

<!--FOOTER-->
<footer>
    
</footer>

<script src="script.js"></script>
</body>
</html>
