<!DOCTYPE html>
<html lang="en">

<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
    <title>
        Registro de pilotos
    </title>

    <link rel="stylesheet" href="estilos.css">
    
</head>

<body>
    

<!--HEADER-->


    <header>

        <h1 class="titulo" id = "Hangar">Hangar de naves</h1>

        <h1 class="titulo" id = "Pilotos">Registro de pilotos</h1>

        <h1 class="titulo" id = "Misiones" >Panel de misiones</h1>

        <h1 class="titulo" id = "Alianza">Mando de la alianza</h1>
        
    </header>


    <main>






<!--Seccion 1 HANGAR DE NAVES -->

<div id="seccion1">

     <h1>🚀 Hangar de Naves Rebelde</h1>

    <div class="control">
        <input type="text" id="buscador" placeholder="Buscar nave por nombre...">

        <select id="filtroTipo">
            <option value="todos">Todos los tipos</option>
        </select>

        <button id="ordenarBtn">Ordenar por velocidad ↑</button>
    </div>

    <div id="contador">Mostrando 0 naves</div>

    <div class="hangar" id="hangar"></div>

</div>







<!--Seccion 2 REGISTRO PILOTOS  -->


   <div id = "seccion2" class="registroPilotos">

    <h1 id="h1cuestionario">Registre su piloto</h1>

    <div class="contenedorPrincipal">


        <div class="divFormulario">

            <img id="soldado" src="./imgStarWars/soldado.png">

            <form id="formularioPilotos" class="formularioPilotos">


                <input type="text" id="inputNombre" required placeholder="Nombre del piloto:">

                <input type="text" id="inputRango" required placeholder="Rango:">

                <input type="number" id="inputVictorias" required placeholder="Número de victorias:" min="0">

                <select id="selectNave" required>

                    <option value="" disabled selected>Nave asignada:</option>

                </select>

                <select id="selectEstado" required>

                    <option value="" disabled selected>Estado del piloto:</option>

                    <option value="Activo">Activo</option>

                    <option value="Herido">Herido</option>

                    <option value="KIA">KIA</option>

                </select>

                <button id="guardarPiloto">Guardar piloto</button>


            </form>


        </div>

        <div class="divLista">

            <h2>Flota Registrada</h2>

            <table class="tablaPilotos">

                <thead>

                    <tr>

                        <th>Piloto</th>

                        <th>Rango</th>

                        <th>Victorias</th>

                        <th>Nave</th>

                        <th>Estado</th>

                        <th></th>
                        
                    </tr>

                </thead>

                <tbody id="cuerpoTablaPilotos">

                    </tbody>

            </table>


        </div>

    </div>


</div>








<!--Sección 3 PANEL DE MISIONES-->

<div id="seccion3" class="oculto">
    <h1>📋 Centro de Operaciones: Misiones</h1>

    <div class="mision-form">
        <div class="input-group">
            <input type="text" id="nombreMision" placeholder="Nombre de la misión">
            <input type="text" id="descMision" placeholder="Objetivo/Descripción">
        </div>
        
        <div class="input-group">
            <select id="selectPilotoMision">
                <option value="">Cargando pilotos...</option>
            </select>

            <select id="selectDificultadMision">
                <option value="facil">Nivel: Fácil</option>
                <option value="media">Nivel: Media</option>
                <option value="dificil">Nivel: Difícil</option>
                <option value="suicida">Nivel: SUICIDA</option>
            </select>
            <button id="addMisionBtn">Asignar Misión</button>
        </div>
    </div>

    <div class="filtro-contenedor">
        <label>Filtrar por riesgo:</label>
        <select id="filtroDificultad">
            <option value="todos">Todos los niveles</option>
            <option value="facil">Fácil</option>
            <option value="media">Media</option>
            <option value="dificil">Difícil</option>
            <option value="suicida">Suicida</option>
        </select>
    </div>

    <div class="kanban-board">
        <div class="kanban-col" id="col-pendiente">
            <div class="col-header">PENDIENTE <span id="count-pendiente">0</span></div>
            <div class="misiones-lista" id="lista-pendiente"></div>
        </div>

        <div class="kanban-col" id="col-curso">
            <div class="col-header header-curso">EN CURSO <span id="count-curso">0</span></div>
            <div class="misiones-lista" id="lista-curso"></div>
        </div>

        <div class="kanban-col" id="col-completada">
            <div class="col-header header-completada">COMPLETADA <span id="count-completada">0</span></div>
            <div class="misiones-lista" id="lista-completada"></div>
        </div>
    </div>
</div>


























<!--Sección 4 MANDO DE LA ALIANZA-->

<div id="seccion4">

</div>

    </main>


<!--FOOTER-->


    <footer>

        
    </footer>


    <script src="java.js"></script>


</body>
</html>
